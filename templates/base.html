<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% block title %}SignBridge{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#9B87E0"/>
        <stop offset="100%" stop-color="#5F4BB0"/>
      </linearGradient>
      <symbol id="markIcon" viewBox="0 0 40 40">
        <rect width="40" height="40" rx="11" fill="url(#markGrad)"/>
        <rect x="13.5" y="21" width="13" height="10.5" rx="4" fill="#fff"/>
        <line x1="16.5" y1="21.5" x2="16.5" y2="9.5" stroke="#fff" stroke-width="3.1" stroke-linecap="round"/>
        <line x1="23.5" y1="21.5" x2="23.5" y2="12" stroke="#fff" stroke-width="3.1" stroke-linecap="round"/>
        <line x1="14" y1="24.5" x2="7.3" y2="19.3" stroke="#fff" stroke-width="3.1" stroke-linecap="round"/>
      </symbol>
    </defs>
  </svg>

  <div class="nav">
    <div class="nav-left">
      <a href="{{ url_for('index') }}" class="nav-home">&larr; Home</a>
      <div class="brand display"><svg class="mark"><use href="#markIcon"/></svg>Sign<span>Bridge</span></div>
    </div>
    <div class="nav-links">
      <a href="{{ url_for('analytics.dashboard_page') }}" class="{{ 'active' if active=='dashboard' }}">Home</a>
      <a href="{{ url_for('analytics.dashboard_page') }}#learn-with-us" class="{{ 'active' if active=='learn' }}">Learn with Us</a>
      <a href="{{ url_for('analytics.for_you_page') }}" class="{{ 'active' if active=='foryou' }}">For You</a>
      <a href="{{ url_for('analytics.history_page') }}" class="{{ 'active' if active=='history' }}">History</a>
      <a href="{{ url_for('analytics.gestures_page') }}" class="{{ 'active' if active=='gestures' }}">Gestures</a>
      <a href="{{ url_for('analytics.analytics_page') }}" class="{{ 'active' if active=='analytics' }}">Analytics</a>
      <a href="{{ url_for('analytics.about_page') }}" class="{{ 'active' if active=='about' }}">About Us</a>
      <form id="logoutForm"><button type="button" class="btn btn-outline" id="logoutBtn">Log out</button></form>
    </div>
  </div>

  <div class="wrap">
    {% block content %}{% endblock %}
  </div>

  <footer class="foot">SignBridge · Tech-Expo Social Impact &amp; Inclusion Project</footer>

<script>
document.getElementById('logoutBtn').addEventListener('click', async ()=>{
  await fetch('/api/auth/logout', {method:'POST'});
  window.location.href = '/login';
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
