<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create account — SignBridge</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <svg width="0" height="0" style="position:absolute">
      <defs>
        <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#9B87E0"/>
          <stop offset="100%" stop-color="#5F4BB0"/>
        </linearGradient>
        <symbol id="markIcon" viewBox="0 0 40 40">
          <rect width="40" height="40" rx="11" fill="url(#markGrad)"/>
          <circle cx="12" cy="20" r="4" fill="#fff"/>
          <circle cx="28" cy="20" r="4" fill="#fff"/>
          <path d="M16 20 Q20 12 24 20" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round"/>
          <path d="M16 20 Q20 28 24 20" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round" opacity="0.55"/>
        </symbol>
      </defs>
    </svg>
    <h1 class="display"><svg class="mark" style="margin-right:8px;"><use href="#markIcon"/></svg>Sign<span style="color:var(--lav-600)">Bridge</span></h1>
    <p class="sub">Create an account to start translating.</p>

    <div class="error-box" id="errorBox"></div>

    <form id="registerForm">
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" required autocomplete="name" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="new-password" />
        <div class="hint">At least 8 characters, one uppercase letter, one number.</div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create account</button>
    </form>

    <div class="switch-link">Already have an account? <a href="/login">Log in</a></div>
  </div>
</div>

<script>
const form = document.getElementById('registerForm');
const errorBox = document.getElementById('errorBox');

form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  errorBox.classList.remove('show');
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  try{
    const res = await fetch('/api/auth/register', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, email, password})
    });
    const data = await res.json();
    if(!res.ok){
      errorBox.textContent = data.error || 'Something went wrong.';
      errorBox.classList.add('show');
      return;
    }
    window.location.href = '/dashboard';
  }catch(err){
    errorBox.textContent = 'Could not reach the server. Please try again.';
    errorBox.classList.add('show');
  }
});
</script>
</body>
</html>
