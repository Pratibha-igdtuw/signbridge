{% extends "base.html" %}
{% block title %}Analytics — SignBridge{% endblock %}
{% block content %}

<div class="stats-grid" id="statsGrid"></div>

<div class="card">
  <h2>Most Used Signs</h2>
  <div id="topGestures"><div class="empty">Loading…</div></div>
</div>

{% endblock %}
{% block scripts %}
<script>
async function loadStats(){
  const res = await fetch('/api/stats');
  const s = await res.json();

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-tile"><div class="num">${s.total_translations}</div><div class="lbl">Total Translations</div></div>
    <div class="stat-tile"><div class="num">${s.total_conversations}</div><div class="lbl">Conversations</div></div>
    <div class="stat-tile"><div class="num">${s.by_source.sign || 0}</div><div class="lbl">Signs Detected</div></div>
    <div class="stat-tile"><div class="num">${s.by_source.voice || 0}</div><div class="lbl">Voice Messages</div></div>
    <div class="stat-tile"><div class="num">${s.total_logins}</div><div class="lbl">Total Logins</div></div>
  `;

  const top = document.getElementById('topGestures');
  if(!s.top_gestures.length){
    top.innerHTML = '<div class="empty">No signs used yet — go translate something!</div>';
    return;
  }
  const max = Math.max(...s.top_gestures.map(g => g.count));
  top.innerHTML = s.top_gestures.map(g => `
    <div class="bar-row">
      <div class="name">${g.gesture_key}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(g.count/max*100).toFixed(0)}%"></div></div>
      <div class="count">${g.count}</div>
    </div>
  `).join('');
}
loadStats();
</script>
{% endblock %}
