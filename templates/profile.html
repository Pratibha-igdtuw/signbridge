{% extends "base.html" %}
{% block title %}My Profile{% endblock %}
{% block heading %}My Profile{% endblock %}
{% block content %}
<div class="max-w-2xl space-y-6">

  <!-- Profile info card -->
  <div class="bg-white rounded-lg border border-slate-200 p-6">
    <h2 class="text-sm font-semibold text-ink mb-4">Personal Information</h2>
    <form method="post" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="action" value="update_info">

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">Full Name</label>
          <input name="full_name" value="{{ user_db.full_name or '' }}" required
                 class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                        focus:border-signal focus:ring-1 focus:ring-signal outline-none">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">Email</label>
          <input type="email" value="{{ user_db.email or '' }}" disabled
                 class="w-full rounded-md border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-500 cursor-not-allowed">
          <p class="text-xs text-slate-400 mt-1">Contact admin to change email.</p>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">Contact Number</label>
          <input name="contact_no" value="{{ user_db.contact_no or '' }}" type="tel"
                 class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                        focus:border-signal focus:ring-1 focus:ring-signal outline-none">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">Year</label>
          <select name="year" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                                     focus:border-signal focus:ring-1 focus:ring-signal outline-none">
            <option value="">—</option>
            {% for y in [1,2,3,4] %}
              <option value="{{ y }}" {{ 'selected' if user_db.year == y else '' }}>Year {{ y }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">Branch / Department</label>
          <input name="branch" value="{{ user_db.branch or '' }}"
                 class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                        focus:border-signal focus:ring-1 focus:ring-signal outline-none">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">University / College</label>
          <input name="university" value="{{ user_db.university or '' }}"
                 class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                        focus:border-signal focus:ring-1 focus:ring-signal outline-none">
        </div>
      </div>

      <div class="flex items-center gap-3 pt-2 border-t border-slate-100">
        <button class="bg-signal hover:bg-teal-700 text-white text-sm font-medium px-4 py-2 rounded-md transition">
          Save Changes
        </button>
        <span class="text-xs text-slate-400">Role: <strong>{{ user_db.role }}</strong> · Username: <strong>{{ user_db.username }}</strong></span>
      </div>
    </form>
  </div>

  <!-- Change password card -->
  <div class="bg-white rounded-lg border border-slate-200 p-6">
    <h2 class="text-sm font-semibold text-ink mb-4">Change Password</h2>
    <form method="post" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="action" value="change_password">

      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1">Current Password</label>
        <div class="relative">
          <input id="pw-cur" name="current_password" type="password" required
                 class="w-full rounded-md border border-slate-300 px-3 py-2 pr-10 text-sm
                        focus:border-signal focus:ring-1 focus:ring-signal outline-none">
          <button type="button" onclick="toggleEye('pw-cur','eye-cur')"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700">
            <span id="eye-cur">👁️</span>
          </button>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">New Password</label>
          <div class="relative">
            <input id="pw-new" name="new_password" type="password" required
                   class="w-full rounded-md border border-slate-300 px-3 py-2 pr-10 text-sm
                          focus:border-signal focus:ring-1 focus:ring-signal outline-none">
            <button type="button" onclick="toggleEye('pw-new','eye-new')"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700">
              <span id="eye-new">👁️</span>
            </button>
          </div>
          <div class="mt-1.5 h-1 bg-slate-200 rounded-full overflow-hidden">
            <div id="pw-bar-cp" class="h-full rounded-full transition-all duration-300 w-0"></div>
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">Confirm New Password</label>
          <div class="relative">
            <input id="pw-conf" name="confirm_password" type="password" required
                   class="w-full rounded-md border border-slate-300 px-3 py-2 pr-10 text-sm
                          focus:border-signal focus:ring-1 focus:ring-signal outline-none">
            <button type="button" onclick="toggleEye('pw-conf','eye-conf')"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700">
              <span id="eye-conf">👁️</span>
            </button>
          </div>
        </div>
      </div>

      <button class="bg-ink hover:bg-steel text-white text-sm font-medium px-4 py-2 rounded-md transition">
        Change Password
      </button>
    </form>
  </div>

</div>

<script>
function toggleEye(inputId, iconId) {
  const inp = document.getElementById(inputId);
  const ico = document.getElementById(iconId);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  ico.textContent = inp.type === 'password' ? '👁️' : '🙈';
}
const pwNew = document.getElementById('pw-new');
const bar = document.getElementById('pw-bar-cp');
function score(v) {
  let s = 0;
  if (v.length >= 8) s++;
  if (v.length >= 12) s++;
  if (/[A-Z]/.test(v)) s++;
  if (/[a-z]/.test(v)) s++;
  if (/\d/.test(v)) s++;
  if (/[^A-Za-z0-9]/.test(v)) s++;
  return s;
}
const bgs = ['bg-slate-200','bg-red-400','bg-orange-400','bg-yellow-400','bg-teal-400','bg-teal-600'];
const ws = ['0%','20%','40%','60%','80%','100%'];
pwNew.addEventListener('input', () => {
  const s = Math.min(score(pwNew.value), 5);
  bar.style.width = pwNew.value ? ws[s] : '0%';
  bar.className = `h-full rounded-full transition-all duration-300 ${bgs[pwNew.value ? s : 0]}`;
});
</script>
{% endblock %}
