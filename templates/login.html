<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — SignBridge</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
  <div class="auth-shell">
    <div class="auth-card">
      <svg width="0" height="0" style="position:absolute">
        <defs>
          <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#9B87E0" />
            <stop offset="100%" stop-color="#5F4BB0" />
          </linearGradient>
          <symbol id="markIcon" viewBox="0 0 48 48">
            <path d="M10 27C10 16.5 16.5 8.5 24 8.5C31.5 8.5 38 16.5 38 27" stroke="url(#markGrad)" stroke-width="6.4"
              stroke-linecap="round" fill="none" />
            <line x1="14.4" y1="27" x2="14.4" y2="37" stroke="url(#markGrad)" stroke-width="6.4"
              stroke-linecap="round" />
            <line x1="33.6" y1="27" x2="33.6" y2="37" stroke="url(#markGrad)" stroke-width="6.4"
              stroke-linecap="round" />
          </symbol>
        </defs>
      </svg>
      <h1 class="display"><svg class="mark" style="margin-right:8px;">
          <use href="#markIcon" />
        </svg>Sign<span style="color:var(--lav-600)">Bridge</span></h1>
      <p class="sub">Log in to continue your conversations.</p>

      <div class="error-box" id="errorBox"></div>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">Password</label>

          <div class="password-wrapper">
            <input type="password" id="password" required autocomplete="current-password" />

            <i class="fa-solid fa-eye" id="togglePassword">
            </i>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Log in</button>
      </form>

      <div class="switch-link">Don't have an account? <a href="/register">Create one</a></div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');

    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");

    togglePassword.addEventListener("click", () => {

      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        togglePassword.classList.replace("fa-eye", "fa-eye-slash");
      } else {
        passwordInput.type = "password";
        togglePassword.classList.replace("fa-eye-slash", "fa-eye");
      }

    });
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('show');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          errorBox.textContent = data.error || 'Something went wrong.';
          errorBox.classList.add('show');
          return;
        }
        window.location.href = '/dashboard';
      } catch (err) {
        errorBox.textContent = 'Could not reach the server. Please try again.';
        errorBox.classList.add('show');
      }
    });
  </script>
</body>

</html>
