<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in — SignBridge</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <svg width="0" height="0" style="position:absolute">
      <defs>
        <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#9B87E0"/>
          <stop offset="100%" stop-color="#5F4BB0"/>
        </linearGradient>
        <symbol id="markIcon" viewBox="0 0 40 40">
          <rect width="40" height="40" rx="11" fill="url(#markGrad)"/>
          <rect x="13.5" y="21" width="13" height="10.5" rx="4" fill="#fff"/>
          <line x1="16.5" y1="21.5" x2="16.5" y2="9.5" stroke="#fff" stroke-width="3.1" stroke-linecap="round"/>
          <line x1="23.5" y1="21.5" x2="23.5" y2="12" stroke="#fff" stroke-width="3.1" stroke-linecap="round"/>
          <line x1="14" y1="24.5" x2="7.3" y2="19.3" stroke="#fff" stroke-width="3.1" stroke-linecap="round"/>
        </symbol>
      </defs>
    </svg>
    <h1 class="display"><svg class="mark" style="margin-right:8px;"><use href="#markIcon"/></svg>Sign<span style="color:var(--lav-600)">Bridge</span></h1>
    <p class="sub">Log in to continue your conversations.</p>

    <div class="error-box" id="errorBox"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Log in</button>
    </form>

    <div class="switch-link">Don't have an account? <a href="/register">Create one</a></div>
  </div>
</div>

<script>
const form = document.getElementById('loginForm');
const errorBox = document.getElementById('errorBox');

form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  errorBox.classList.remove('show');
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  try{
    const res = await fetch('/api/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if(!res.ok){
      errorBox.textContent = data.error || 'Something went wrong.';
      errorBox.classList.add('show');
      return;
    }
    window.location.href = '/dashboard';
  }catch(err){
    errorBox.textContent = 'Could not reach the server. Please try again.';
    errorBox.classList.add('show');
  }
});
</script>
</body>
</html>
