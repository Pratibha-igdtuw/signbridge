{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}
{% block auth %}

<div class="min-h-screen flex items-center justify-center bg-slate-100">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">

        <h2 class="text-2xl font-semibold mb-2">Forgot Password</h2>
        <p class="text-slate-500 mb-6">
            Enter your registered email address to receive a password reset link.
        </p>

        <label class="block text-sm font-medium mb-2">
            Email Address
        </label>

        <input type="email" name="email" required class="w-full rounded-md border border-slate-300 px-3 py-2 mb-5">
        <div class="text-center mt-4">
            <a href="{{ url_for('login') }}" class="text-signal hover:underline">
                Back to Login
            </a>
        </div>

    </div>
</div>

{% endblock %}
