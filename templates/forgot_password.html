{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block auth %}

<div class="min-h-screen flex items-center justify-center bg-slate-100 px-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">

        <h2 class="text-3xl font-bold mb-3 text-slate-800">
            Forgot Password
        </h2>

        <p class="text-slate-500 mb-6">
            Enter your registered email address to receive a password reset link.
        </p>

        <form method="POST">

            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <label class="block text-sm font-medium text-slate-700 mb-2">
                Email Address
            </label>

            <input type="email" name="email" required placeholder="Enter your email"
                class="w-full border border-slate-300 bg-white text-ink rounded-lg px-4 py-3 mb-5 focus:ring-2 focus:ring-teal-500 focus:outline-none">

            <button type="submit"
                class="w-full bg-teal-600 hover:bg-teal-700 text-white py-3 rounded-lg font-medium transition">

                Send Reset Link

            </button>

        </form>
        <div class="text-center mt-6">
            <a href="{{ url_for('login') }}" class="text-teal-600 hover:underline">
                ← Back to Login
            </a>
        </div>

    </div>

</div>

{% endblock %}
